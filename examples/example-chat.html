<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chatbot Widget - Converted from WP</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
  </head>

  <body>
    <h1>Plain HTML + Chatbot Widget (Converted)</h1>
    <!-- <script src="https://storage.googleapis.com/kriatix-crm-files/tts-script/index.js"></script> -->
    <script src="../chat-flows/example-flow.js"></script>
    <!-- Load the chatbot UMD script asynchronously, then init -->
    <!-- <script>
    // --- Utility: load an external script and call callback when ready ---
    function loadScript(src, callback) {
      const s = document.createElement("script");
      s.src = src;
      s.async = true;
      s.onload = callback;
      s.onerror = () => console.error("Failed to load script:", src);
      document.head.appendChild(s);
    }

    // --- Generate and persist an anonymous user id (once) ---
    function generateAnonymousId() {
      const id = "anon_" + Math.random().toString(36).slice(2, 10);
      try {
        sessionStorage.setItem("userId", id);
      } catch (e) { }
      return id;
    }

    // --- Page info & lead key helpers ---
    function getPageInfoSync() {
      // Synchronous partial info (base64 reversible key)
      const pageUrl = window.location.href;
      const pagePath = window.location.pathname;
      const base64Key = btoa(pageUrl); // reversible
      // async SHA256 helper (returns Promise<string>)
      async function sha256Hex(message) {
        const encoder = new TextEncoder();
        const data = encoder.encode(message);
        const digest = await crypto.subtle.digest("SHA-256", data);
        return Array.from(new Uint8Array(digest))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }
      return { pageUrl, pagePath, base64Key, sha256Hex };
    }

    // --- send collected lead to external CRM endpoint ---
    async function sendToCRM(userData) {
      const payload = {
        name: userData.name || "",
        company: userData.company || "",
        contactNumber: userData.mobile || "",
        email: userData.email || "",
        source: "website",
        status: "New",
        requirements: userData.requirements || "",
        organizationId: "ae946bfd-d2dc-480f-844a-012d3e619299",
      };
      let result;
      try {
        const res = await fetch(
          "http://localhost:8080/api/v1/chatbot/chat/leads",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          },
        );
        result = await res.json().catch(() => null);
        console.log("CRM response:", result || res.status);
        return result?.data;
      } catch (err) {
        console.error("CRM submit error:", err);
        return null;
      } finally {
        userData.leadId = result?.data?.id;
        sessionStorage.setItem("chatFlowData", JSON.stringify(userData));
      }
    }

    // --- Validation helpers used in flow ---
    const nameRegex = /^[A-Za-z\s]{2,50}$/;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    function isValidPhoneNumber(phone) {
      const clean = phone.replace(/[-\s()]/g, "").trim();
      if (!/^\+?\d{7,15}$/.test(clean)) return false;
      const numberOnly = clean.replace(/^\+/, "");
      if (/^(\d)\1+$/.test(numberOnly)) return false;
      if (new Set(numberOnly).size < 3) return false;
      return true;
    }

    // --- Services list (kept same as WP) ---
    const services = [
      {
        id: "1",
        text: "I represent a company that has training and upskilling needs",
        value: "company-training",
      },
      {
        id: "2",
        text: "I want a demo of NetSkill LMS/LXP/Frontline Training Solution",
        value: "netskill-demo",
      },
      {
        id: "3",
        text: "I want certified trainers for my company's training reqs",
        value: "certified-trainers",
      },
      {
        id: "4",
        text: "I'm a working professional looking to upskill",
        value: "professional-upskill",
      },
      { id: "5", text: "I'm just exploring", value: "exploring" },
    ];

    // --- Initialize chatbot after UMD lib loads ---
    loadScript("../dist/umd/index.js", function init() {
      // defensive: ensure lib present
      if (!window.UniversalChatbot || !UniversalChatbot.Chatbot) {
        console.error("UniversalChatbot not found on page.");
        return;
      }

      // Get page info & metadata to attach to emails/CRM
      const pageInfo = getPageInfoSync();
      const defaultMetadata = {
        websiteUrl: window.location.origin,
        leadFrom: document.referrer || document.location.origin,
        ipAddress: "N/A",
        location: "N/A",
        chatViewUrl: pageInfo.pageUrl,
        botName: "Omni",
        leadKey: pageInfo.base64Key,
      };

      // create bot instance
      const bot = new UniversalChatbot.Chatbot({
        title: "Omni",
        primaryColor: "#8b5cf6",
        secondaryColor: "#6366f1",
        backgroundColor: "#fff",
        borderRadius: "16px",
        autoOpen: false,
        botIcon: `<img src="https://custpostimages.s3.ap-south-1.amazonaws.com/sb_images/avatar-v101.svg" width="32" height="32" style="width:100%;height:100%;display:block;border-radius:50%;" alt="Natalie avatar">`,
        chatIcon: `<img src="https://custpostimages.s3.ap-south-1.amazonaws.com/sb_images/avatar-v101.svg" width="32" height="32" style="width:100%;height:100%;display:block;border-radius:50%;" alt="Natalie avatar">`,
        welcomeMessage:
          "Hi! Welcome to Netskill - AI Powered Corporate Training & Upskilling Platform",
        position: "bottom-right",

        // input config and menu (call action shown)
        inputConfig: {
          type: "text",
          placeholder: "Type your message...",
          menu: {
            enabled: true,
            position: "right",
            items: [
              {
                id: "call",
                icon: '<img style="width: 18px;height: 18px;float: left;margin-right: 10px;margin-top: 2px;" src="https://custpostimages.s3.ap-south-1.amazonaws.com/sb_images/bot_images/Call_.svg">',
                text: "Call us",
                action: "call",
                actionValue: "+91-9863077000",
              },
            ],
          },
        },

        bot_id: "net_skill_bot",
        user_id: sessionStorage.getItem("userId") || generateAnonymousId(),
        persistMessages: true,
        maxMessages: 100,

        // ChatHooks: sendEmail + onComplete behavior (keeps parity with WP)
        ChatHooks: {
          onComplete: {
            enabled: true,
            defaultAction: true,
            customAction: async (sessionId, sessionData) => {
              console.log(
                "Custom onComplete called:",
                sessionId,
                sessionData,
              );
              return sessionData;
            },
          },
          sendEmail: {
            enabled: true,
            defaultAction: true,
            config: {
              recipients: ["meenaketan.padhy@goodworklabs.com"],
              sender: {
                name: "Omni - Netskill Bot",
                email: "contact@goodworklabs.com",
              },
              subject: "New lead from netskill chatbot",

              metadata: {
                ...defaultMetadata,
                ...JSON.parse(sessionStorage.getItem("chatFlowData") || "{}"),
              },
            },
          },
        },

        // -- called when user sends a chat message (text / option object / etc) --
        onMessageSend: async (message) => {
          // normalize content
          let content = "";
          if (message == null) content = "";
          else if (typeof message === "string") content = message.trim();
          else if (typeof message === "object") {
            // if object from option selection, library might send { optionId, optionText } or similar
            if (typeof message.content === "string")
              content = message.content.trim();
            else content = message;
          } else content = message;

          let step = sessionStorage.getItem("chatFlowStep") || "welcome";
          const raw = sessionStorage.getItem("chatFlowData") || "{}";
          let userData = JSON.parse(raw);

          // convenience: persist helper
          function save(data, nextStep) {
            try {
              sessionStorage.setItem(
                "chatFlowData",
                JSON.stringify(data || {}),
              );
            } catch (e) { }
            if (nextStep)
              try {
                sessionStorage.setItem("chatFlowStep", nextStep);
              } catch (e) { }
          }

          switch (step) {
            case "serviceSelected": {
              // Library option response might be an object { optionId, optionText } or a string value
              if (typeof content === "object" && content.optionId) {
                const idx = services.findIndex(
                  (s) => s.id === String(content.optionId),
                );
                if (idx >= 0) {
                  userData.selectedService = services[idx].value;
                  userData.requirements = services[idx].text;
                } else {
                  userData.selectedService =
                    content.optionId || content.optionText || content;
                  userData.requirements = content.optionText || content;
                }
              } else {
                userData.selectedService = content;
                userData.requirements = content;
              }

              // ask for user's name next
              setTimeout(() => {
                bot.pushMessage(
                  "Great, before we take next steps, we need some information.",
                );
                bot.pushMessage("What is your name?");
                bot.setInputType("text", {
                  placeholder: "Enter your full name",
                });
                save(userData, "collectName");
              }, 300);
              break;
            }

            case "collectName": {
              if (!nameRegex.test(String(content))) {
                bot.pushMessage(
                  "⚠️ Please enter a valid name (letters only, 2–50 chars).",
                );
                return;
              }
              userData.name = String(content).trim();
              bot.pushMessage(`Nice to meet you, ${userData.name}! 😊`);
              setTimeout(() => {
                bot.pushMessage("What's your mobile number?");
                bot.setInputType("phone", {
                  placeholder: "Enter your mobile number",
                  phoneConfig: { defaultCountryCode: "+91" },
                });
                save(userData, "collectMobile");
              }, 300);
              break;
            }

            case "collectMobile": {
              const phoneRaw = String(content || "")
                .replace(/[-\s()]/g, "")
                .trim();
              if (!isValidPhoneNumber(phoneRaw)) {
                bot.pushMessage(
                  "⚠️ Please enter a valid 7 to 15-digit mobile number. (e.g., +91-9876543210 or 9876543210)",
                );
                return;
              }
              userData.mobile = String(content).trim();
              save(userData, null); // keep data
              setTimeout(() => {
                bot.pushMessage("Thanks! What's your email address?");
                bot.setInputType("email", {
                  placeholder: "Enter your email address",
                });
                save(userData, "collectEmail");
              }, 300);
              break;
            }

            case "collectEmail": {
              if (!emailRegex.test(String(content))) {
                bot.pushMessage("⚠️ Please enter a valid email address.");
                return;
              }
              userData.email = String(content).trim();
              setTimeout(() => {
                bot.pushMessage("And your company name?");
                bot.setInputType("text", {
                  placeholder: "Enter your company name",
                });
                save(userData, "collectCompany");
              }, 300);
              break;
            }

            case "collectCompany": {
              if (!/^[\w\-\.\&\s,]{2,100}$/.test(String(content))) {
                bot.pushMessage(
                  "⚠️ Please enter a valid company name (2–100 characters).",
                );
                return;
              }
              userData.company = String(content).trim();
              save(userData, null);

              bot.pushMessage(
                "Thanks — we’ve collected your details. Our team will get back to you shortly.",
              );
              try {
                const leadResponse = await sendToCRM(userData);

                if (!leadResponse?.id) {
                  console.error("Lead ID not received from CRM");
                }
                userData.leadId = leadResponse?.id;
                sessionStorage.setItem(
                  "chatFlowData",
                  JSON.stringify(userData),
                );
                // mark complete to Chat SDK (if available) and send to CRM
                if (typeof bot.completeSession === "function") {
                  await bot.completeSession({
                    collectedUserData: userData, // now contains leadId
                    completedStep: "completed",
                    timestamp: new Date().toISOString(),
                  });
                }
              } catch (err) {
                console.warn("completeSession error (non-fatal):", err);
              } finally {
                sessionStorage.setItem("chatFlowStep", "completed");
                bot.setInputType("text", {
                  placeholder: "Type your message...",
                });
              }
              break;
            }

            case "completed":
              bot.pushMessage(
                "We’ve already collected your info. Thank you!",
              );
              break;

            default:
              // default welcome / fallthrough
              bot.pushMessage(
                "We’ve already collected your info. Thank you!",
              );
              break;
          } // switch
        },
        // onReset: re-show initial options
        onReset: async () => {
          bot.setInputType("text", { placeholder: "Type your message..." });
          setTimeout(() => showInitialOptions(), 1000);
        },
      }); // new Chatbot({...})

      // --- Show initial options (services) ---
      function showInitialOptions() {
        const step = sessionStorage.getItem("chatFlowStep");
        if (step) return;
        // pushOptionSelection expects a question + array of options.
        // Using same services array defined earlier.
        bot.pushOptionSelection("How can we help you?", services, {
          allowMultiple: false,
          minSelections: 1,
          confirmButtonText: "Confirm",
        });
        sessionStorage.setItem("chatFlowStep", "serviceSelected");
      }
      autoOpenChatbotTTL(
        bot,
        () => {
          bot.open();
          setTimeout(showInitialOptions, 800);
        },
        {
          ttlMs: 1 * 60 * 60 * 1000, // 1hr
        },
      );
      // Listen to inputMenu "call" action to trigger tel: — the widget may already handle this,
      // but we provide a fallback listener if the library emits menu actions.
      if (typeof bot.onMenuAction === "function") {
        bot.onMenuAction((action) => {
          if (action && action.id === "call" && action.actionValue) {
            window.location.href = `tel:${action.actionValue}`;
          }
        });
      }
    }); // end loadScript callback
  </script> -->
  </body>
</html>
